<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — KCG Jewellery Orders</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm px-4">

  <div class="text-center mb-8">
    <div class="text-5xl mb-3">💎</div>
    <h1 class="text-2xl font-bold text-gray-800">KCG Jewellery Orders</h1>
    <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  {% for category, message in messages %}
  <div class="mb-4 px-4 py-3 rounded-lg text-sm
    {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
    {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <form method="POST" class="bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-4">
    <div>
      <label class="text-sm text-gray-600 mb-1 block">Username</label>
      <input name="username" autofocus required placeholder="Enter username"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-yellow-400">
    </div>
    <div>
      <label class="text-sm text-gray-600 mb-1 block">Password</label>
      <input name="password" type="password" required placeholder="Enter password"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-yellow-400">
    </div>
    <button type="submit"
      class="w-full bg-yellow-700 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-yellow-800 transition mt-1">
      Sign In
    </button>
  </form>

</div>
</body>
</html>

{% extends "base.html" %}
{% block title %}New Order{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-6">

  <div class="flex items-center gap-4 mb-6">
    <a href="/dashboard" class="text-sm text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">← Back</a>
    <h1 class="text-xl font-bold text-gray-800">New Order</h1>
  </div>

  <form method="POST" enctype="multipart/form-data" class="bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-6">

    <!-- Order No -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Order Reference</div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Order No <span class="text-red-500">*</span>
            <span class="text-xs text-gray-400 font-normal ml-1">Your book/receipt number</span>
          </label>
          <input name="order_no" required placeholder="e.g. 001, B1-045"
            value="{{ form.order_no if form else '' }}"
            class="w-full border border-yellow-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 bg-white font-medium">
        </div>
        <div>
          <label class="text-sm text-gray-400 mb-1 block">System Ref No
            <span class="text-xs font-normal ml-1">(auto-generated)</span>
          </label>
          <input disabled placeholder="Will be generated on save"
            class="w-full border border-gray-100 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-400 cursor-not-allowed">
        </div>
      </div>
    </div>

    <!-- Customer -->
    <div>
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Customer</div>
      <div class="flex flex-col gap-3">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Customer Name <span class="text-red-500">*</span></label>
          <input name="customer_name" required placeholder="Customer name"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400"
            list="customer-suggestions">
          <datalist id="customer-suggestions">
            {% for c in existing_customers %}
            <option value="{{ c.name }}">{{ c.name }}{% if c.phone %} — {{ c.phone }}{% endif %}</option>
            {% endfor %}
          </datalist>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm text-gray-600 mb-1 block">Phone <span class="text-gray-400 text-xs">(optional)</span></label>
            <input name="customer_phone" placeholder="Phone number"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
          </div>
          <div>
            <label class="text-sm text-gray-600 mb-1 block">Address <span class="text-gray-400 text-xs">(optional)</span></label>
            <input name="customer_address" placeholder="Address"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
          </div>
        </div>
      </div>
    </div>

    <!-- Product -->
    <div>
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Product Details</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Product *</label>
          <select name="product_id" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
            <option value="">Select product</option>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Sub Product *</label>
          <input name="sub_product" required placeholder="e.g. Stone Necklace"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Purity *</label>
          <select name="purity" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
            <option>24K</option><option selected>22K</option><option>18K</option><option>14K</option>
          </select>
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Weight (grams) *</label>
          <input name="weight" type="number" step="0.001" min="0" required placeholder="e.g. 15.500"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Size</label>
          <input name="size" placeholder="e.g. 16 inches / Size 8"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Quantity *</label>
          <input name="quantity" type="number" min="1" value="1" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
      </div>
    </div>

    <!-- Vendor -->
    <div>
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Vendor</div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">Vendor *</label>
        <select name="vendor_id" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
          <option value="">Select vendor</option>
          {% for v in vendors %}
          <option value="{{ v.id }}">{{ v.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Dates -->
    <div>
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Dates</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Order Date *</label>
          <input name="order_date" type="date" value="{{ today }}" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Expected Delivery <span class="text-red-500">*</span></label>
          <input name="expected_delivery_date" type="date" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
      </div>
    </div>

    <!-- Design -->
    <div>
      <div class="text-xs font-semibold text-yellow-700 uppercase tracking-wider mb-3">Design</div>
      <div class="flex flex-col gap-3">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Design Notes</label>
          <textarea name="design_notes" rows="3" placeholder="Describe the design, special instructions..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400 resize-none"></textarea>
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">
            Reference Images <span class="text-red-500">*</span>
            <span class="text-xs text-gray-400 font-normal ml-1">Up to 3 images</span>
          </label>
          <!-- Hidden inputs — populated by JS, submitted with the form -->
          <div id="fileInputs"></div>
          <!-- Preview area -->
          <div id="imgPreview" class="flex gap-3 mt-2 flex-wrap"></div>
          <!-- Add button — hidden once 3 images selected -->
          <div id="addImgBtn" class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-yellow-400 transition mt-2 cursor-pointer text-center" onclick="document.getElementById('hiddenPicker').click()">
            <p class="text-sm text-gray-500">📎 Click to add image <span class="text-xs text-gray-400">(png, jpg, jpeg, gif, webp)</span></p>
            <p class="text-xs text-gray-400 mt-1" id="imgCount">0 / 3 selected</p>
          </div>
          <input type="file" id="hiddenPicker" accept="image/*" class="hidden" onchange="addImage(this)">
        </div>
      </div>
    </div>

    <button type="submit"
      class="w-full bg-yellow-700 text-white py-3 rounded-xl font-semibold text-sm hover:bg-yellow-800 transition">
      ✓ Create Order
    </button>

  </form>
</div>
<script>
const selectedFiles = [];

function addImage(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  if (selectedFiles.length >= 3) {
    alert('Maximum 3 images allowed.');
    input.value = '';
    return;
  }
  selectedFiles.push(file);
  input.value = ''; // reset so same file can be re-added if needed
  renderPreviews();
}

function removeImage(idx) {
  selectedFiles.splice(idx, 1);
  renderPreviews();
}

function renderPreviews() {
  const preview   = document.getElementById('imgPreview');
  const countEl   = document.getElementById('imgCount');
  const addBtn    = document.getElementById('addImgBtn');
  const inputsDiv = document.getElementById('fileInputs');

  preview.innerHTML   = '';
  inputsDiv.innerHTML = '';

  selectedFiles.forEach((file, i) => {
    // Hidden file input so the form submits this file
    const dt = new DataTransfer();
    dt.items.add(file);
    const inp = document.createElement('input');
    inp.type   = 'file';
    inp.name   = 'reference_images';
    inp.style.display = 'none';
    inp.files  = dt.files;
    inputsDiv.appendChild(inp);

    // Preview thumbnail
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement('div');
      div.className = 'relative';
      div.innerHTML = `
        <img src="${e.target.result}" class="w-24 h-24 object-cover rounded-xl border-2 border-yellow-200 shadow-sm">
        <span class="absolute -top-1 -right-1 w-5 h-5 bg-yellow-700 text-white text-xs rounded-full flex items-center justify-center font-bold">${i+1}</span>
        <button type="button" onclick="removeImage(${i})"
          class="absolute -bottom-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold leading-none">✕</button>
      `;
      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });

  countEl.textContent = `${selectedFiles.length} / 3 selected`;
  addBtn.style.display = selectedFiles.length >= 3 ? 'none' : 'block';
}
</script>
{% endblock %}
